<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SCM Runner</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="game-shell">
        <div class="hud" aria-live="polite">
          <span id="high-score">HI 0000</span>
          <span id="score">0000</span>
        </div>
        <div id="time-effect" class="time-hud hidden" aria-live="polite">
          <img id="time-effect-icon" src="./SVGs/time.svg" alt="Time effect" />
          <span id="time-effect-countdown">7.0s</span>
        </div>
        <canvas
          id="game-canvas"
          width="160"
          height="90"
          aria-label="Side scrolling jumping game"
        ></canvas>
        <div id="start-instruction" class="message start-instruction">Press Space or click to start</div>
        <div id="message" class="message hidden">Click or press Space to jump</div>
        <div id="final-score" class="message final-score hidden">FINAL SCORE 0000</div>
      </section>
    </main>
    <script src="./game.js"></script>
  </body>
</html>
